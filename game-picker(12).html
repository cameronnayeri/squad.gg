<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQUAD.GG — Game Night Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #000;
    --bg2:    #0a0a0a;
    --bg3:    #111;
    --panel:  #141414;
    --panel2: #1a1a1a;
    --border: #2a2a2a;
    --border2:#3a3a3a;
    --text:   #fff;
    --text2:  #666;
    --text3:  #999;
    --green:  #22c55e;
    --red:    #ef4444;
    --yellow: #eab308;
    --blue:   #0047AB;
    --blue-l: #1a5fd4;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; line-height:1.5; min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

  /* ── LOGIN ── */
  #loginScreen:not([hidden]) { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; background:#000; }
  .logo { font-size:clamp(1.8rem,6vw,3.2rem); font-weight:900; letter-spacing:-2px; color:#fff; margin-bottom:.25rem; }
  .logo span { color:var(--green); }
  .tagline { font-size:.8rem; font-weight:400; color:var(--text2); letter-spacing:.15em; text-transform:uppercase; margin-bottom:3rem; }
  .login-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:2rem; width:100%; max-width:400px; }
  .tab-row { display:flex; border-bottom:1px solid var(--border); margin-bottom:1.75rem; }
  .tab-btn { flex:1; background:none; border:none; color:var(--text2); font-family:'Inter',sans-serif; font-size:.75rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:.65rem; cursor:pointer; transition:color .15s; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab-btn.active { color:#fff; border-bottom-color:#fff; }
  .tab-btn:hover:not(.active) { color:var(--text3); }
  .form-group { margin-bottom:1rem; }
  .form-label { display:block; font-size:.7rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text2); margin-bottom:.4rem; }
  .form-input { width:100%; background:var(--bg2); border:1px solid var(--border); color:#fff; font-family:'Inter',sans-serif; font-size:.9rem; padding:.65rem .85rem; outline:none; border-radius:6px; transition:border-color .15s; }
  .form-input:focus { border-color:var(--blue-l); }
  .form-input::placeholder { color:var(--text2); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:.4rem; background:none; border:1px solid var(--border2); color:var(--text3); font-family:'Inter',sans-serif; font-size:.72rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:.55rem 1.1rem; cursor:pointer; border-radius:6px; transition:all .15s; white-space:nowrap; }
  .btn:hover { border-color:#fff; color:#fff; background:rgba(255,255,255,.04); }
  .btn-full { width:100%; }
  .btn-primary { background:var(--blue); border-color:var(--blue); color:#fff; }
  .btn-primary:hover { background:var(--blue-l); border-color:var(--blue-l); color:#fff; }
  .btn-danger { border-color:var(--red); color:var(--red); }
  .btn-danger:hover { background:rgba(239,68,68,.08); border-color:var(--red); color:var(--red); }
  .btn-green { border-color:var(--green); color:var(--green); }
  .btn-green:hover { background:rgba(34,197,94,.08); }
  .btn-sm { padding:.35rem .7rem; font-size:.65rem; }
  .btn:disabled { opacity:.3; cursor:not-allowed; }
  .btn:disabled:hover { background:none; border-color:var(--border2); color:var(--text2); }
  .error-msg { font-size:.78rem; color:var(--red); margin-top:.85rem; text-align:center; min-height:1.2em; font-weight:500; }

  /* ── APP SHELL ── */
  #appScreen { display:none; }
  #appScreen.visible { display:block !important; }
  .topbar { background:var(--bg); border-bottom:1px solid var(--border); padding:.75rem 1.5rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
  .topbar-logo { font-size:1rem; font-weight:900; letter-spacing:-1px; color:#fff; }
  .topbar-logo span { color:var(--green); }
  .user-pill { display:flex; align-items:center; gap:.5rem; background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:.3rem .75rem .3rem .3rem; }
  .user-avatar { width:26px; height:26px; border-radius:50%; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:700; color:#fff; flex-shrink:0; }
  .user-name-top { font-size:.8rem; font-weight:600; color:#fff; }

  /* ── LAYOUT ── */
  .app-layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 49px); }
  .sidebar { background:var(--bg); border-right:1px solid var(--border); padding:1.25rem 1rem; overflow-y:auto; max-height:calc(100vh - 49px); position:sticky; top:49px; }
  .sidebar-section { margin-bottom:2rem; }
  .sidebar-title { font-size:.65rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text2); margin-bottom:.75rem; padding-bottom:.5rem; border-bottom:1px solid var(--border); }

  /* Players */
  .player-item { display:flex; align-items:center; justify-content:space-between; gap:.5rem; padding:.4rem .5rem; border-radius:6px; margin-bottom:.25rem; border:1px solid transparent; transition:background .1s; }
  .player-item:hover { background:var(--panel); }
  .player-item.you { background:var(--panel); border-color:var(--border); }
  .player-item.inactive { opacity:.4; }
  .player-item.inactive .player-name-side { text-decoration:line-through; }
  .player-left { display:flex; align-items:center; gap:.5rem; min-width:0; flex:1; }
  .player-dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }
  .player-dot.other { background:var(--blue-l); }
  .player-name-side { font-size:.82rem; font-weight:500; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .you-tag { font-size:.65rem; color:var(--text2); font-weight:400; }

  /* Player toggle */
  .player-toggle { width:30px; height:16px; border-radius:8px; background:var(--border2); position:relative; flex-shrink:0; cursor:pointer; border:none; outline:none; transition:background .2s; }
  .player-toggle::after { content:''; position:absolute; width:10px; height:10px; border-radius:50%; background:var(--text2); top:3px; left:3px; transition:all .18s; }
  .player-toggle.on { background:rgba(34,197,94,.25); }
  .player-toggle.on::after { left:17px; background:var(--green); }

  /* Category chips */
  .cat-chip { display:flex; align-items:center; padding:.4rem .6rem; border-radius:6px; margin-bottom:.25rem; border:1px solid var(--border); background:var(--panel); gap:.5rem; }
  .cat-chip-icon { font-size:.9rem; flex-shrink:0; }
  .cat-chip-label { font-size:.8rem; font-weight:500; color:#fff; flex:1; overflow:hidden; text-overflow:ellipsis; }
  .cat-toggle { width:32px; height:17px; border-radius:9px; background:var(--border2); position:relative; flex-shrink:0; cursor:pointer; border:none; outline:none; transition:background .18s; }
  .cat-toggle::after { content:''; position:absolute; width:11px; height:11px; border-radius:50%; background:var(--text2); top:3px; left:3px; transition:all .18s; }
  .cat-toggle.on { background:rgba(34,197,94,.25); }
  .cat-toggle.on::after { left:18px; background:var(--green); }
  .add-game-form { display:flex; flex-direction:column; gap:.5rem; }
  .form-select { width:100%; background:var(--bg2); border:1px solid var(--border); color:#fff; font-family:'Inter',sans-serif; font-size:.82rem; padding:.5rem .75rem; outline:none; border-radius:6px; cursor:pointer; }
  .form-select option { background:var(--panel); }
  .form-select:focus { border-color:var(--blue-l); }
  .add-cat-row { display:flex; gap:.5rem; margin-top:.5rem; }

  /* ── MAIN CONTENT ── */
  .main-content { padding:1.5rem; overflow-x:auto; background:var(--bg2); }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:.75rem; }
  .section-title { font-size:.75rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text2); }

  /* Result banner */
  .result-banner { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--yellow); border-radius:8px; padding:1rem 1.25rem; margin-bottom:1.25rem; display:flex; align-items:center; gap:1.25rem; flex-wrap:wrap; }
  .result-label { font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--yellow); flex-shrink:0; }
  .result-games { display:flex; flex-direction:column; gap:.15rem; flex:1; }
  .result-game-item { font-size:1.4rem; font-weight:700; color:#fff; letter-spacing:-.5px; line-height:1.2; }
  .result-game-item:not(:first-child) { font-size:1rem; font-weight:600; color:var(--text3); }
  .result-score { font-size:.8rem; font-weight:600; color:var(--green); white-space:nowrap; }

  /* Table */
  .table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:8px; background:var(--panel); }
  table { border-collapse:collapse; width:100%; min-width:600px; }
  thead th { background:var(--panel2); padding:.6rem .85rem; font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; text-align:center; border-bottom:1px solid var(--border); border-right:1px solid var(--border); white-space:nowrap; color:var(--text2); }
  thead th.you { color:var(--green); }
  thead th.game-col { text-align:left; min-width:200px; }
  thead th.inactive-col { opacity:.3; text-decoration:line-through; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .08s; }
  tbody tr:hover { background:rgba(255,255,255,.025); }
  tbody tr.highlight { background:rgba(34,197,94,.04); border-left:2px solid var(--green); }
  td { padding:.55rem .85rem; border-right:1px solid var(--border); vertical-align:middle; }
  .game-name { font-size:.88rem; font-weight:500; color:#fff; }
  .game-name-wrap { display:flex; align-items:center; gap:.4rem; }
  .score-cell { text-align:center; font-size:.9rem; font-weight:700; min-width:56px; font-variant-numeric:tabular-nums; }
  .score-high { color:var(--green); }
  .score-mid  { color:var(--yellow); }
  .score-low  { color:var(--text2); }

  /* Checkboxes */
  .check-cell { text-align:center; }
  .game-check { appearance:none; width:18px; height:18px; border:1.5px solid var(--border2); background:var(--bg2); border-radius:4px; cursor:pointer; position:relative; transition:all .12s; display:inline-block; vertical-align:middle; }
  .game-check:checked { background:var(--green); border-color:var(--green); }
  .game-check:checked::after { content:''; position:absolute; top:2px; left:5px; width:5px; height:9px; border:2px solid #000; border-top:none; border-left:none; transform:rotate(45deg); }
  .game-check:disabled { opacity:.35; cursor:not-allowed; }
  .game-check.others-check { cursor:default; }
  .game-check.others-check:checked { background:var(--blue); border-color:var(--blue); }
  .game-check.others-check:checked::after { border-color:#fff; }

  /* Cat disabled cell */
  td.cat-off { position:relative; background:rgba(239,68,68,.03); }
  td.cat-off .game-check { opacity:.12; pointer-events:none; }
  td.cat-off::after { content:'—'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--red); font-size:.7rem; opacity:.5; pointer-events:none; font-weight:700; }

  /* Category row divider */
  tr.cat-row td { background:var(--bg); padding:.3rem .85rem; border-top:1px solid var(--border); }
  .cat-row-label { font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text2); }

  /* Del button */
  .del-btn { background:none; border:none; color:var(--border2); cursor:pointer; font-size:.8rem; padding:.15rem .35rem; transition:color .12s; border-radius:4px; line-height:1; }
  .del-btn:hover { color:var(--red); }

  /* Stars */
  .star-btn { background:none; border:none; cursor:pointer; font-size:.95rem; line-height:1; padding:0; color:var(--border2); transition:color .12s, transform .12s; }
  .star-btn:hover { color:var(--yellow); transform:scale(1.2); }
  .star-btn.lit { color:var(--yellow); }
  .star-btn:disabled { opacity:.25; cursor:not-allowed; transform:none; }
  .others-stars { display:flex; gap:1px; margin-left:2px; font-size:.7rem; color:var(--yellow); opacity:.7; }

  /* Empty state */
  .empty-state { text-align:center; padding:4rem 2rem; color:var(--text2); }
  .empty-icon { font-size:2.5rem; margin-bottom:.75rem; }
  .empty-text { font-size:.85rem; font-weight:500; letter-spacing:.05em; color:var(--text2); }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1000; align-items:center; justify-content:center; padding:1rem; }
  .modal-box { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:1.75rem; width:100%; max-width:440px; position:relative; }
  .modal-title { font-size:.75rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#fff; margin-bottom:.5rem; }
  .modal-close { position:absolute; top:1rem; right:1rem; background:none; border:none; color:var(--text2); font-size:1.1rem; cursor:pointer; line-height:1; transition:color .12s; }
  .modal-close:hover { color:#fff; }
  .modal-note { font-size:.78rem; color:var(--text2); margin-bottom:1.25rem; line-height:1.6; }
  .admin-user-row { display:flex; align-items:center; justify-content:space-between; padding:.6rem .75rem; margin-bottom:.3rem; border:1px solid var(--border); border-radius:6px; background:var(--bg2); gap:1rem; }
  .admin-user-name { font-size:.85rem; font-weight:500; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Debug */
  #debugBar { display:none; position:fixed; bottom:0; left:0; right:0; background:#1a0000; border-top:1px solid var(--red); color:var(--red); font-size:.72rem; padding:.4rem 1rem; z-index:9998; font-family:'Inter',sans-serif; }


  /* ── DRAG & DROP ── */
  .drag-handle { cursor:grab; color:var(--border2); font-size:.85rem; padding:0 .3rem 0 0; flex-shrink:0; user-select:none; line-height:1; transition:color .12s; }
  .drag-handle:hover { color:var(--text3); }
  tr.dragging { opacity:.35; }
  tr.drag-over-above td { border-top:2px solid var(--blue-l) !important; }
  tr.drag-over-below td { border-bottom:2px solid var(--blue-l) !important; }
  tr.cat-row.drag-over-cat td { background:rgba(26,95,212,.12) !important; border-top:2px solid var(--blue-l) !important; }
  tr.cat-row { cursor:grab; }
  tr.cat-row.dragging-cat { opacity:.35; }
  tr.cat-row.drag-over-cat-above td { border-top:2px solid var(--yellow) !important; }
  .drop-hint { display:none; }
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:#555; }

  @media(max-width:768px) {
    .app-layout { grid-template-columns:1fr; }
    .sidebar { position:static; max-height:none; border-right:none; border-bottom:1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo">SQUAD<span>.GG</span></div>
  <div class="tagline">What are we playing tonight?</div>
  <div class="login-box">
    <div class="tab-row">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">NEW PLAYER</button>
    </div>
    <div id="loginForm">
      <div class="form-group"><label class="form-label">USERNAME</label><input class="form-input" id="loginUser" type="text" placeholder="enter username" autocomplete="off"/></div>
      <div class="form-group"><label class="form-label">PASSWORD</label><input class="form-input" id="loginPass" type="password" placeholder="ask your squad" autocomplete="off"/></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-group"><label class="form-label">CHOOSE USERNAME</label><input class="form-input" id="regUser" type="text" placeholder="your gamer tag" autocomplete="off" maxlength="20"/></div>
      <div class="form-group"><label class="form-label">GROUP PASSWORD</label><input class="form-input" id="regPass" type="password" placeholder="ask your friends" autocomplete="off"/></div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
    </div>
    <div class="error-msg" id="authError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-logo">SQUAD<span style="color:var(--green)">.GG</span></div>
    <div style="display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;">
      <span style="font-size:.75rem;color:var(--text2);"><span id="onlineCount" style="color:#fff;font-weight:700;">0</span> players</span>
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar">??</div>
        <span class="user-name-top" id="userNameTop"></span>
      </div>
      <button class="btn btn-sm" onclick="openAdminModal()">Manage</button>
      <button class="btn btn-danger btn-sm" onclick="doLogout()">Log out</button>
    </div>
  </div>
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Players</div>
        <div id="playersList"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">My Categories</div>
        
        <div id="catFilters"></div>
        <div class="add-cat-row">
          <input class="form-input" id="newCatName" placeholder="new category..." style="flex:1;font-size:.85rem;padding:.4rem .7rem;" maxlength="24"/>
          <button class="btn btn-sm" onclick="addCategory()" style="white-space:nowrap;">+ Add</button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Add Game</div>
        <div class="add-game-form">
          <input class="form-input" id="newGameName" placeholder="Game name..." style="font-size:.9rem;" maxlength="40"/>
          <select class="form-select" id="newGameCat"></select>
          <button class="btn btn-primary btn-sm" onclick="addGame()">Add Game</button>
        </div>
      </div>
    </div>
    <div class="main-content">
      <div class="section-header">
        <div class="section-title">Tonight's Game Board</div>
        <button class="btn btn-green btn-sm" onclick="recalcResults()">Find Best Game</button>
      </div>
      <div class="result-banner" id="resultBanner" style="display:none;">
        <div class="result-label" id="resultLabel">BEST MATCH</div>
        <div class="result-games" id="resultGames"></div>
        <div class="result-score" id="resultScore"></div>
      </div>
      <div class="table-wrap">
        <table id="gameTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">&#127918;</div>
        <div class="empty-text">No games yet — add some above</div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal" onclick="if(event.target===this)closeAdminModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAdminModal()">&#x2715;</button>
    <div class="modal-title">Manage Players</div>
    <div class="modal-note">Remove a player and all their data from the squad.</div>
    <div id="adminUserList"></div>
  </div>
</div>

<!-- DEBUG BAR -->
<div id="debugBar"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue }
                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyAsLO-TJCkNQWgL0o-svsp0gNkcHvae3kA",
  authDomain:"squad-gg-c4db0.firebaseapp.com",
  databaseURL:"https://squad-gg-c4db0-default-rtdb.firebaseio.com",
  projectId:"squad-gg-c4db0",
  storageBucket:"squad-gg-c4db0.firebasestorage.app",
  messagingSenderId:"4300158061",
  appId:"1:4300158061:web:a24b658ccfbcaa895cfb64"
};
const db = getDatabase(initializeApp(FB));
const GROUP_PASS = "ducksalad";
const MAX_STARS  = 3;

const R   = p      => ref(db, p);
const Get = async p => { const s=await get(R(p)); return s.exists()?s.val():null; };
const Set = (p,v)  => set(R(p), v);
const Upd = (p,v)  => update(R(p), v);
const Del = p      => remove(R(p));
const toArr = v => !v?[]:Array.isArray(v)?v.filter(Boolean):Object.values(v).filter(Boolean);
const safeKey = s => s.replace(/[.#$\[\]\/]/g,"_");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const $   = id => document.getElementById(id);

function dbg(m){const b=$("debugBar");b.style.display="block";b.textContent=m;console.log("[SQ]",m);}

// ── STATE ────────────────────────────────────────────────────
let ME       = null;
let gameData = {games:[],categories:[]};
let allUsers = {};   // { username: { checks, catFilters, favorites, active } }
let unsubs   = [];

const CATS=[
  {id:"board",    name:"Board Games",  icon:"\u265f"},
  {id:"moba",     name:"MOBAs",        icon:"\u2694"},
  {id:"shooter",  name:"Shooters",     icon:"\ud83d\udd2b"},
  {id:"rpg",      name:"RPGs",         icon:"\ud83e\uddd9"},
  {id:"party",    name:"Party Games",  icon:"\ud83c\udf89"},
  {id:"strategy", name:"Strategy",     icon:"\ud83c\udff0"},
  {id:"card",     name:"Card Games",   icon:"\ud83c\udccf"},
  {id:"sports",   name:"Sports",       icon:"\u26bd"},
  {id:"other",    name:"Other",        icon:"\ud83c\udfb2"},
];
const GAMES=[
  {id:"g1",name:"League of Legends",catId:"moba",    addedBy:"system"},
  {id:"g2",name:"Dota 2",           catId:"moba",    addedBy:"system"},
  {id:"g3",name:"Valorant",         catId:"shooter", addedBy:"system"},
  {id:"g4",name:"CS2",              catId:"shooter", addedBy:"system"},
  {id:"g5",name:"Catan",            catId:"board",   addedBy:"system"},
  {id:"g6",name:"Among Us",         catId:"party",   addedBy:"system"},
  {id:"g7",name:"Jackbox",          catId:"party",   addedBy:"system"},
  {id:"g8",name:"Elden Ring",       catId:"rpg",     addedBy:"system"},
];

// ── AUTH UI ──────────────────────────────────────────────────
const err  = m => { $("authError").textContent="\u26a0 "+m; };
const busy = on => { $("authError").textContent=on?"\u25cf CONNECTING...":""; };

window.switchTab = tab => {
  $("loginForm").style.display    = tab==="login"    ?"":"none";
  $("registerForm").style.display = tab==="register" ?"":"none";
  $("tabLogin").classList.toggle("active",    tab==="login");
  $("tabRegister").classList.toggle("active", tab==="register");
  $("authError").textContent="";
};

window.doLogin = async () => {
  const user=$("loginUser").value.trim(), pass=$("loginPass").value.trim();
  if(!user) return err("Enter a username");
  if(pass!==GROUP_PASS) return err("Wrong password!");
  busy(true);
  try {
    if(!await Get("users/"+safeKey(user))){ busy(false); return err("User not found — create an account!"); }
    enterApp(user);
  } catch(e){ busy(false); err("Error: "+e.message); }
};

window.doRegister = async () => {
  const user=$("regUser").value.trim(), pass=$("regPass").value.trim();
  if(!user) return err("Choose a username");
  if(!/^[a-zA-Z0-9_\- ]{2,20}$/.test(user)) return err("2-20 chars, letters/numbers only");
  if(pass!==GROUP_PASS) return err("Wrong group password!");
  busy(true);
  try {
    if(await Get("users/"+safeKey(user))){ busy(false); return err("Username taken!"); }
    await ensureGameData();
    const gd=await Get("gameData");
    const checks={}, catFilters={};
    toArr(gd.games).forEach(g      => { checks[g.id]=false; });
    toArr(gd.categories).forEach(c => { catFilters[c.id]=true; });
    await Set("users/"+safeKey(user),{username:user,checks,catFilters,favorites:{},active:true});
    enterApp(user);
  } catch(e){ busy(false); err("Error: "+e.message); }
};

window.doLogout = () => {
  unsubs.forEach(u=>u()); unsubs=[];
  ME=null; allUsers={}; gameData={games:[],categories:[]};
  $("appScreen").classList.remove("visible");
  $("loginScreen").removeAttribute("hidden");
  $("loginUser").value=$("loginPass").value="";
  $("authError").textContent="";
  $("debugBar").style.display="none";
};

async function ensureGameData(){
  if(!await Get("gameData")) await Set("gameData",{categories:CATS,games:GAMES});
}

// ── ENTER APP ────────────────────────────────────────────────
function enterApp(username){
  ME=username;
  busy(false);
  $("userAvatar").textContent  = username.slice(0,2).toUpperCase();
  $("userNameTop").textContent = username;
  dbg("Logged in as "+username);

  let gdReady=false, usReady=false;

  function maybeShow(){
    if(!gdReady||!usReady) return;
    $("loginScreen").setAttribute("hidden","");
    $("appScreen").classList.add("visible");
    try{renderSidebar();}catch(e){dbg("renderSidebar: "+e.message);console.error(e);}
    try{renderTable();}  catch(e){dbg("renderTable: "+e.message);  console.error(e);}
    try{recalcResults();}catch(e){dbg("recalc: "+e.message);       console.error(e);}
    dbg("ALL DONE");
  }

  const u1=onValue(R("gameData"),snap=>{
    try{
      const v=snap.val(); if(!v) return;
      gameData.games      = toArr(v.games);
      gameData.categories = toArr(v.categories);
      gdReady=true;
      if(usReady) syncMyData();
      maybeShow();
      if(gdReady&&usReady) renderApp();
    }catch(e){dbg("gameData err: "+e.message);}
  }, e=>dbg("gameData listen err: "+e.message));

  const u2=onValue(R("users"),snap=>{
    try{
      const v=snap.val()||{};
      allUsers={};
      Object.entries(v).forEach(([k,u])=>{
        if(!u) return;
        allUsers[u.username||k]=u;
      });
      if(!allUsers[ME]) allUsers[ME]={checks:{},catFilters:{},favorites:{},active:true};
      $("onlineCount").textContent=Object.keys(allUsers).length;
      usReady=true;
      maybeShow();
      if(gdReady&&usReady) renderApp();
    }catch(e){dbg("users err: "+e.message);}
  }, e=>dbg("users listen err: "+e.message));

  unsubs.push(u1,u2);
}

function syncMyData(){
  const me=allUsers[ME]; if(!me) return;
  let dirty=false;
  gameData.games.forEach(g=>{
    if(!(g.id in (me.checks||{}))){me.checks=me.checks||{};me.checks[g.id]=false;dirty=true;}
  });
  gameData.categories.forEach(c=>{
    if(!(c.id in (me.catFilters||{}))){me.catFilters=me.catFilters||{};me.catFilters[c.id]=true;dirty=true;}
  });
  if(!me.favorites){me.favorites={};dirty=true;}
  if(!("active" in me)){me.active=true;dirty=true;}
  if(dirty) Upd("users/"+safeKey(ME),{checks:me.checks,catFilters:me.catFilters,favorites:me.favorites,active:me.active});
}

// ── HELPERS ──────────────────────────────────────────────────
function activePlayers(){
  return Object.keys(allUsers).filter(u=>allUsers[u]?.active!==false);
}

function calcScore(gameId){
  const game=gameData.games.find(g=>g.id===gameId); if(!game) return 0;
  return activePlayers().filter(u=>{
    const d=allUsers[u];
    return d && d.catFilters?.[game.catId]!==false && d.checks?.[gameId]===true;
  }).length;
}

function myStarCount(){
  const me=allUsers[ME]; if(!me) return 0;
  return Object.values(me.favorites||{}).filter(Boolean).length;
}

// ── RENDER ───────────────────────────────────────────────────
function renderApp(){
  if(!ME) return;
  try{renderSidebar();}catch(e){dbg("rSidebar: "+e.message);console.error(e);}
  try{renderTable();}  catch(e){dbg("rTable: "+e.message);  console.error(e);}
  try{recalcResults();}catch(e){dbg("rResults: "+e.message);console.error(e);}
}

function renderSidebar(){
  const users=Object.keys(allUsers).sort();

  // Players list with active toggle
  $("playersList").innerHTML = users.map(u=>{
    const isActive = allUsers[u]?.active!==false;
    const isMe     = u===ME;
    const dotClass = isMe?"":"other";
    return `<div class="player-item ${isMe?"you":""} ${!isActive?"inactive":""}">
      <div class="player-left">
        <div class="player-dot ${dotClass}"></div>
        <span class="player-name-side">${esc(u)}${isMe?' <span class="you-tag">(you)</span>':""}</span>
      </div>
      <button class="player-toggle ${isActive?"on":""}" onclick="togglePlayerActive('${esc(u)}')" title="${isActive?"Mark absent":"Mark present"}"></button>
    </div>`;
  }).join("")||`<div style="font-size:.8rem;color:var(--text2);">No players yet</div>`;

  // Category filters
  const me=allUsers[ME]||{};
  $("catFilters").innerHTML=gameData.categories.map(c=>{
    const on=me.catFilters?.[c.id]!==false;
    return `<div class="cat-chip">
      <span class="cat-chip-icon">${c.icon}</span>
      <span class="cat-chip-label">${esc(c.name)}</span>
      <button class="cat-toggle ${on?"on":""}" onclick="toggleCat('${c.id}')"></button>
    </div>`;
  }).join("");

  $("newGameCat").innerHTML=gameData.categories.map(c=>
    `<option value="${c.id}">${c.icon} ${esc(c.name)}</option>`).join("");
}

function renderTable(){
  const active = activePlayers();
  const users  = Object.keys(allUsers).sort((a,b)=>a===ME?-1:b===ME?1:a.localeCompare(b));
  const me     = allUsers[ME]||{};

  $("tableHead").innerHTML=`<tr>
    <th class="game-col" style="text-align:left;">GAME</th>
    <th>SCORE</th>
    ${users.map(u=>{
      const inactive=allUsers[u]?.active===false;
      return `<th class="${u===ME?"you":""} ${inactive?"inactive-col":""}" title="${esc(u)}">${esc(u.length>7?u.slice(0,6)+"\u2026":u)}</th>`;
    }).join("")}
    <th>DEL</th></tr>`;

  if(!gameData.games.length){
    $("tableBody").innerHTML="";$("gameTable").style.display="none";$("emptyState").style.display="";return;
  }
  $("gameTable").style.display="";$("emptyState").style.display="none";

  const byCat={};
  gameData.categories.forEach(c=>byCat[c.id]=[]);
  gameData.games.forEach(g=>(byCat[g.catId]=byCat[g.catId]||[]).push(g));

  let html="";
  gameData.categories.forEach(cat=>{
    const gs=byCat[cat.id]||[];
    // Always render category header (even if empty, so games can be dropped into it)
    html+=`<tr class="cat-row" draggable="true" data-cat-id="${cat.id}">
      <td colspan="${users.length+3}">
        <div style="display:flex;align-items:center;gap:.4rem;">
          <span class="drag-handle" title="Drag to reorder category">\u2807</span>
          <span class="cat-row-label">${cat.icon} ${esc(cat.name)}</span>
        </div>
      </td>
    </tr>`;
    gs.forEach(game=>{
      const score    = calcScore(game.id);
      const total    = active.length;
      const allAgree = score===total&&total>0;
      const cls      = !total?"score-low":score/total>=.75?"score-high":score/total>=.4?"score-mid":"score-low";

      const iStarred  = me.favorites?.[game.id]===true;
      const iCanStar  = myStarCount()<MAX_STARS||iStarred;
      const myStarBtn = `<button class="star-btn ${iStarred?"lit":""}" onclick="toggleStar('${game.id}')" title="${iStarred?"Unstar":"Star ("+myStarCount()+"/"+MAX_STARS+")"}" ${!iCanStar?"disabled":""}>\u2605</button>`;

      const otherStars = Object.entries(allUsers)
        .filter(([u,d])=>u!==ME&&d?.favorites?.[game.id]).map(([u])=>u);
      const otherStarHtml = otherStars.length
        ? `<span class="others-stars" title="${otherStars.map(esc).join(", ")} starred this">${otherStars.map(()=>"\u2605").join("")}</span>`
        : "";

      const cells=users.map(u=>{
        const uData  = allUsers[u]||{};
        const catOff = uData.catFilters?.[game.catId]===false;
        const chk    = uData.checks?.[game.id]?"checked":"";
        const cellCls= catOff?"cat-off":"";
        if(u===ME)
          return `<td class="check-cell ${cellCls}"><input type="checkbox" class="game-check" ${chk} ${catOff?"disabled":""} onchange="toggleGame('${game.id}',this.checked)"/></td>`;
        return `<td class="check-cell ${cellCls}"><input type="checkbox" class="game-check others-check" ${chk} disabled/></td>`;
      }).join("");

      html+=`<tr class="${allAgree?"highlight":""} game-row" draggable="true" data-game-id="${game.id}" data-cat-id="${cat.id}">
        <td>
          <div class="game-name-wrap">
            <span class="drag-handle" title="Drag to reorder or move to another category">\u2807</span>
            ${myStarBtn}
            <span class="game-name">${esc(game.name)}</span>
            ${otherStarHtml}
          </div>
        </td>
        <td class="score-cell"><span class="${cls}">${score}/${total}</span></td>
        ${cells}
        <td><button class="del-btn" onclick="removeGame('${game.id}')">\u2715</button></td>
      </tr>`;
    });
  });
  $("tableBody").innerHTML=html;
  attachDragListeners();
}

function recalcResults(){
  const active=activePlayers();
  const banner=$("resultBanner");
  if(!gameData.games.length||!active.length){banner.style.display="none";return;}

  let bestScore=-1;
  gameData.games.forEach(g=>{const s=calcScore(g.id);if(s>bestScore)bestScore=s;});

  if(bestScore<=0){banner.style.display="none";return;}

  const tied=gameData.games.filter(g=>calcScore(g.id)===bestScore);

  $("resultLabel").textContent = tied.length>1?"TOP MATCHES (TIE)":"BEST MATCH";
  $("resultScore").textContent = `${bestScore} / ${active.length} players`;
  $("resultGames").innerHTML   = tied.map((g,i)=>`<div class="result-game-item">${i>0?"\u25b8 ":""}${esc(g.name)}</div>`).join("");
  banner.style.display="flex";
}
window.recalcResults=recalcResults;


// ── DRAG & DROP ──────────────────────────────────────────────
let dragGame = null;   // gameId being dragged
let dragCat  = null;   // catId being dragged (for category reorder)

function attachDragListeners(){
  const tbody = $("tableBody");

  tbody.querySelectorAll("tr[data-game-id]").forEach(row=>{
    row.addEventListener("dragstart", e=>{
      dragGame = row.dataset.gameId;
      dragCat  = null;
      setTimeout(()=>row.classList.add("dragging"), 0);
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragend", ()=>{
      row.classList.remove("dragging");
      clearDragStyles();
      dragGame = null;
    });
    row.addEventListener("dragover", e=>{
      if(!dragGame) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      clearDragStyles();
      const rect = row.getBoundingClientRect();
      const mid  = rect.top + rect.height/2;
      row.classList.add(e.clientY < mid ? "drag-over-above" : "drag-over-below");
    });
    row.addEventListener("drop", e=>{
      e.preventDefault();
      if(!dragGame || dragGame===row.dataset.gameId) return;
      const rect     = row.getBoundingClientRect();
      const insertAfter = e.clientY >= rect.top + rect.height/2;
      const targetGameId = row.dataset.gameId;
      const targetCatId  = row.dataset.catId;
      reorderGame(dragGame, targetGameId, targetCatId, insertAfter);
      clearDragStyles();
    });
  });

  // Drop onto category header row (move game into that category at end)
  tbody.querySelectorAll("tr.cat-row").forEach(catRow=>{
    catRow.addEventListener("dragstart", e=>{
      if(dragGame) return; // game drag takes priority
      dragCat  = catRow.dataset.catId;
      dragGame = null;
      setTimeout(()=>catRow.classList.add("dragging-cat"), 0);
      e.dataTransfer.effectAllowed = "move";
    });
    catRow.addEventListener("dragend", ()=>{
      catRow.classList.remove("dragging-cat");
      clearDragStyles();
      dragCat = null;
    });
    catRow.addEventListener("dragover", e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      clearDragStyles();
      if(dragGame){
        catRow.classList.add("drag-over-cat");
      } else if(dragCat && dragCat!==catRow.dataset.catId){
        catRow.classList.add("drag-over-cat-above");
      }
    });
    catRow.addEventListener("drop", e=>{
      e.preventDefault();
      if(dragGame){
        // Move game to this category (append at end)
        moveGameToCategory(dragGame, catRow.dataset.catId);
      } else if(dragCat && dragCat!==catRow.dataset.catId){
        reorderCategory(dragCat, catRow.dataset.catId);
      }
      clearDragStyles();
    });
  });
}

function clearDragStyles(){
  $("tableBody").querySelectorAll("tr").forEach(r=>{
    r.classList.remove("drag-over-above","drag-over-below","drag-over-cat","drag-over-cat-above");
  });
}

function reorderGame(fromId, toId, toCatId, insertAfter){
  let games = [...gameData.games];
  const fromIdx = games.findIndex(g=>g.id===fromId);
  if(fromIdx===-1) return;
  const [moved] = games.splice(fromIdx, 1);
  moved.catId = toCatId; // may change category
  const toIdx = games.findIndex(g=>g.id===toId);
  games.splice(insertAfter ? toIdx+1 : toIdx, 0, moved);
  gameData.games = games;
  Upd("gameData",{games});
}

function moveGameToCategory(gameId, catId){
  const games = gameData.games.map(g=>g.id===gameId ? {...g,catId} : g);
  gameData.games = games;
  Upd("gameData",{games});
}

function reorderCategory(fromCatId, beforeCatId){
  let cats = [...gameData.categories];
  const fromIdx = cats.findIndex(c=>c.id===fromCatId);
  if(fromIdx===-1) return;
  const [moved] = cats.splice(fromIdx,1);
  const toIdx = cats.findIndex(c=>c.id===beforeCatId);
  cats.splice(toIdx, 0, moved);
  gameData.categories = cats;
  Upd("gameData",{categories:cats});
}

// ── ACTIONS ──────────────────────────────────────────────────
window.toggleGame=(gameId,checked)=>{
  if(!allUsers[ME]) return;
  allUsers[ME].checks=allUsers[ME].checks||{};
  allUsers[ME].checks[gameId]=checked;
  Upd("users/"+safeKey(ME)+"/checks",{[gameId]:checked});
};

window.toggleStar=gameId=>{
  const me=allUsers[ME]; if(!me) return;
  me.favorites=me.favorites||{};
  const was=me.favorites[gameId]===true;
  if(!was && myStarCount()>=MAX_STARS) return; // at limit
  me.favorites[gameId]=!was;
  Upd("users/"+safeKey(ME)+"/favorites",{[gameId]:!was});
  renderApp();
};

window.togglePlayerActive=username=>{
  const u=allUsers[username]; if(!u) return;
  const was=u.active!==false;
  u.active=!was;
  Upd("users/"+safeKey(username),{active:!was});
  renderApp();
};

window.toggleCat=catId=>{
  if(!allUsers[ME]) return;
  allUsers[ME].catFilters=allUsers[ME].catFilters||{};
  const was=allUsers[ME].catFilters[catId]!==false;
  allUsers[ME].catFilters[catId]=!was;
  Upd("users/"+safeKey(ME)+"/catFilters",{[catId]:!was});
  renderApp();
};

window.addGame=async()=>{
  const name=$("newGameName").value.trim(), catId=$("newGameCat").value;
  if(!name) return;
  const id="g"+Date.now();
  await Upd("gameData",{games:[...gameData.games,{id,name,catId,addedBy:ME}]});
  const upd={};
  Object.keys(allUsers).forEach(u=>{upd["users/"+safeKey(u)+"/checks/"+id]=false;});
  if(Object.keys(upd).length) await update(R("/"),upd);
  $("newGameName").value="";
};

window.removeGame=async gameId=>{
  await Upd("gameData",{games:gameData.games.filter(g=>g.id!==gameId)});
  const upd={};
  Object.keys(allUsers).forEach(u=>{
    upd["users/"+safeKey(u)+"/checks/"+gameId]=null;
    upd["users/"+safeKey(u)+"/favorites/"+gameId]=null;
  });
  if(Object.keys(upd).length) await update(R("/"),upd);
};

window.addCategory=async()=>{
  const name=$("newCatName").value.trim(); if(!name) return;
  const icons=["\ud83c\udfaf","\ud83d\udd79","\ud83c\udfaa","\ud83c\udf0c","\ud83d\udd2e","\ud83c\udfc6","\ud83d\udca5","\ud83c\udf00"];
  const icon=icons[Math.floor(Math.random()*icons.length)];
  const id="cat_"+Date.now();
  await Upd("gameData",{categories:[...gameData.categories,{id,name,icon}]});
  const upd={};
  Object.keys(allUsers).forEach(u=>{upd["users/"+safeKey(u)+"/catFilters/"+id]=true;});
  if(Object.keys(upd).length) await update(R("/"),upd);
  $("newCatName").value="";
};

// ── ADMIN ────────────────────────────────────────────────────
window.openAdminModal=()=>{
  $("adminModal").style.display="flex";
  $("adminUserList").innerHTML=Object.keys(allUsers).sort().map(u=>
    `<div class="admin-user-row">
      <span class="admin-user-name">${esc(u)}${u===ME?' <span class="you-tag">(you)</span>':""}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteUser('${esc(u)}')" ${u===ME?"disabled":""}>DELETE</button>
    </div>`).join("");
};
window.closeAdminModal=()=>{ $("adminModal").style.display="none"; };
window.deleteUser=async username=>{
  if(username===ME) return;
  if(!confirm(`Delete player "${username}"? Cannot be undone.`)) return;
  await Del("users/"+safeKey(username));
  window.openAdminModal();
};

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  if($("loginForm").style.display!=="none") window.doLogin();
  else if($("registerForm").style.display!=="none") window.doRegister();
});
</script>
</body>
